<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LP Ranger</title>
<style>
  :root {
    --bg: #0e1218;
    --card: #171e27;
    --fg: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --warn: #f0883e;
    --good: #3fb950;
    --bad: #f85149;
    --border: #232b36;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); height: 100%; }
  body { font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header {
    padding: 0.8rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
  header .wallet-wrap {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex: 1;
    max-width: 520px;
  }
  header input.wallet {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 0.4rem 0.7rem;
    border-radius: 5px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.8rem;
  }
  header input.wallet:focus { outline: none; border-color: var(--accent); }
  header button.clear-wallet {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 0.35rem 0.6rem;
    border-radius: 5px;
    cursor: pointer;
    font-family: inherit;
  }
  header button.clear-wallet:hover { color: var(--fg); }
  header .meta {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: "SF Mono", Menlo, monospace;
    white-space: nowrap;
  }
  main { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
  .section-label {
    color: var(--muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0 0 0.6rem 0.2rem;
  }
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }
  .empty code {
    display: inline-block;
    margin-top: 0.7rem;
    padding: 0.6rem 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.85rem;
    color: var(--fg);
  }
  .grid {
    display: grid;
    gap: 1rem;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.2rem;
  }
  .card .hdr {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.6rem;
    gap: 0.4rem;
  }
  .card .pid {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 1rem;
    color: var(--accent);
    margin-left: 0.3rem;
  }
  .card .emoji { font-size: 1.4rem; }
  .card .tag {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    font-size: 0.7rem;
    text-transform: uppercase;
    background: var(--border);
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .card .tag.stale  { background: transparent; color: var(--warn);  border: 1px solid var(--warn); }
  .card .tag.live   { background: transparent; color: var(--good);  border: 1px solid var(--good); }
  .card .tag.idle   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .card dl {
    display: grid;
    grid-template-columns: max-content 1fr;
    column-gap: 1rem;
    row-gap: 0.3rem;
    margin: 0.5rem 0;
    font-size: 0.9rem;
  }
  .card dt { color: var(--muted); }
  .card dd { margin: 0; font-variant-numeric: tabular-nums; }
  .card .actions {
    margin-top: 0.7rem;
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .card button, .card select {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 0.35rem 0.7rem;
    border-radius: 5px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
  }
  .card button:hover, .card select:hover { border-color: var(--fg); }
  .card button.primary { border-color: var(--accent); color: var(--accent); }
  .card button.primary:hover { background: var(--accent); color: var(--bg); }
  .card button.danger { border-color: var(--bad); color: var(--bad); }
  .card button.danger:hover { background: var(--bad); color: var(--bg); }
  .card button.ghost { color: var(--muted); }
  .card button.ghost:hover { color: var(--fg); }
  .card .err { color: var(--bad); font-size: 0.8rem; margin-top: 0.3rem; word-break: break-word; }
  .perf-note {
    margin-top: 0.45rem;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .summary-card {
    margin-bottom: 1rem;
  }
  .summary-card h2 {
    margin: 0 0 0.6rem 0;
    font-size: 0.95rem;
    color: var(--accent);
  }
  .perf-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 0.7rem;
    font-size: 0.82rem;
  }
  .perf-table th,
  .perf-table td {
    text-align: left;
    padding: 0.35rem 0.45rem;
    border-top: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  .perf-table th {
    color: var(--muted);
    font-weight: 500;
  }
  .perf-table .current {
    color: var(--accent);
  }

  /* Console modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    z-index: 100;
  }
  .modal-backdrop.open { display: block; }
  .modal {
    position: fixed;
    inset: 3vh 3vw;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: none;
    flex-direction: column;
    z-index: 101;
  }
  .modal.open { display: flex; }
  .modal > header {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal > header h2 { margin: 0; font-size: 0.95rem; font-family: "SF Mono", Menlo, monospace; color: var(--accent); }
  .modal > header .close {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 0.3rem 0.7rem;
    border-radius: 5px;
    cursor: pointer;
    font-family: inherit;
  }
  .modal pre {
    flex: 1;
    margin: 0;
    padding: 1rem;
    overflow: auto;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.82rem;
    line-height: 1.4;
    color: var(--fg);
    background: var(--bg);
    white-space: pre-wrap;
    word-break: break-all;
  }
  .modal .follow-bar {
    padding: 0.4rem 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.8rem;
    align-items: center;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .modal .follow-bar label { cursor: pointer; }
  .log-line { display: block; }
  .log-error { color: #f87171; }
  .log-warn  { color: #fbbf24; }
  .log-action{ color: #60a5fa; }
  .log-ok    { color: #4ade80; }
  .mini-log  { margin-top: 0.5rem; padding: 0.4rem 0.6rem; background: #111; border-radius: 4px; font-family: "SF Mono", Menlo, monospace; font-size: 0.75rem; line-height: 1.5; max-height: 5.5rem; overflow: hidden; }

  /* Collapsible empty-positions */
  details.empty-box { margin-top: 1.5rem; }
  details.empty-box summary {
    cursor: pointer;
    color: var(--muted);
    padding: 0.5rem 0.2rem;
    font-size: 0.85rem;
    list-style: none;
    user-select: none;
  }
  details.empty-box summary::-webkit-details-marker { display: none; }
  details.empty-box summary::before {
    content: "▸";
    display: inline-block;
    margin-right: 0.5rem;
    transition: transform 0.15s;
    font-family: "SF Mono", Menlo, monospace;
  }
  details.empty-box[open] summary::before { transform: rotate(90deg); }
  details.empty-box summary:hover { color: var(--fg); }

  /* Strategies button + modal */
  header button.strategies {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 0.35rem 0.8rem;
    border-radius: 5px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
  }
  header button.strategies:hover { color: var(--fg); border-color: var(--fg); }

  .strategies-list {
    flex: 0 0 240px;
    border-right: 1px solid var(--border);
    overflow: auto;
  }
  .strategies-list .item {
    padding: 0.6rem 0.8rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.4rem;
  }
  .strategies-list .item:hover { background: var(--bg); }
  .strategies-list .item.active { background: var(--bg); border-left: 2px solid var(--accent); padding-left: calc(0.8rem - 2px); }
  .strategies-list .item .name { font-family: "SF Mono", Menlo, monospace; font-size: 0.85rem; color: var(--fg); }
  .strategies-list .item .src {
    font-size: 0.65rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .strategies-list .item .src.user { background: var(--accent); color: var(--bg); }
  .strategies-list .item .src.builtin { color: var(--muted); border: 1px solid var(--border); }

  .strategy-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .strategy-head {
    padding: 0.8rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.6rem;
  }
  .strategy-head h3 { margin: 0; font-size: 0.95rem; font-family: "SF Mono", Menlo, monospace; color: var(--accent); }
  .strategy-head .actions { display: flex; gap: 0.4rem; }
  .strategy-head button {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 0.3rem 0.7rem;
    border-radius: 5px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
  }
  .strategy-head button:hover { border-color: var(--fg); }
  .strategy-head button.primary { border-color: var(--accent); color: var(--accent); }
  .strategy-head button.primary:hover { background: var(--accent); color: var(--bg); }
  .strategy-head button:disabled { opacity: 0.4; cursor: not-allowed; }

  .strategy-content {
    flex: 1;
    overflow: auto;
    padding: 1rem;
  }
  .strategy-content textarea {
    width: 100%;
    height: 100%;
    min-height: 400px;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 0.7rem;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.85rem;
    resize: vertical;
  }

  .beautify {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.85rem;
  }
  .beautify .row {
    display: grid;
    grid-template-columns: 1fr 1.3fr;
    column-gap: 1rem;
    padding: 0.25rem 0;
    border-bottom: 1px solid var(--border);
  }
  .beautify .row:last-child { border-bottom: none; }
  .beautify .key { color: var(--accent); }
  .beautify .val { color: var(--fg); word-break: break-word; }
  .beautify .val.string { color: #a5d6ff; }
  .beautify .val.number { color: #79c0ff; }
  .beautify .val.bool { color: var(--warn); }
  .beautify .doc { color: var(--muted); font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 0.8rem; margin-top: 0.1rem; }
  .beautify .group {
    margin-top: 0.8rem;
    padding-left: 0;
  }
  .beautify .group .group-title {
    color: var(--muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.3rem;
    padding-bottom: 0.2rem;
    border-bottom: 1px solid var(--border);
  }

  /* Modal layout override for strategies (two-pane) */
  .modal.strategies-modal { flex-direction: column; }
  .modal.strategies-modal .panes {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .upload-hint { color: var(--muted); font-size: 0.85rem; padding: 2rem; text-align: center; }
</style>
</head>
<body>

<header>
  <h1>🏊 LP Ranger</h1>
  <div class="wallet-wrap">
    <input class="wallet" id="wallet" placeholder="wallet address (0x…) — shows your positions" autocomplete="off" spellcheck="false">
    <button class="clear-wallet" id="wallet-clear" title="clear wallet">×</button>
  </div>
  <button class="strategies" id="open-strategies">strategies</button>
  <button class="strategies" id="open-updates">updates</button>
  <div class="meta" id="meta">loading…</div>
</header>

<main id="main">
  <div class="empty">loading…</div>
</main>

<div class="modal-backdrop" id="modal-backdrop"></div>

<!-- Console modal -->
<div class="modal" id="modal">
  <header>
    <h2 id="modal-title">console</h2>
    <div style="display:flex;gap:0.5rem;align-items:center">
      <button class="close" id="modal-diagnostics">download diagnostics</button>
      <button class="close" id="modal-download">download log</button>
      <button class="close" id="modal-clear">clear log</button>
      <button class="close" id="modal-close">close</button>
    </div>
  </header>
  <pre id="modal-log"></pre>
  <div class="follow-bar">
    <label><input type="checkbox" id="follow" checked> follow tail</label>
    <span id="modal-meta"></span>
  </div>
</div>

<!-- Updates modal -->
<div class="modal" id="updates-modal">
  <header>
    <h2>Updates</h2>
    <button class="close" id="updates-close">close</button>
  </header>
  <div class="strategy-content" id="updates-body" style="padding:1rem;overflow:auto">
    <div class="upload-hint">loading…</div>
  </div>
</div>

<!-- Strategies modal -->
<div class="modal strategies-modal" id="strategies-modal">
  <header>
    <h2>Strategies</h2>
    <div style="display:flex;gap:0.5rem;align-items:center">
      <input type="file" id="strat-upload" accept="application/json,.json" style="display:none">
      <button class="close" id="strat-upload-btn">upload new</button>
      <button class="close" id="strat-close">close</button>
    </div>
  </header>
  <div class="panes">
    <div class="strategies-list" id="strat-list"></div>
    <div class="strategy-body" id="strat-body">
      <div class="upload-hint" id="strat-hint">Select a strategy on the left, or upload a new JSON file.</div>
    </div>
  </div>
</div>

<script>
(() => {
  const STATUS_EMOJI_RE = /[🟢🟡🔴🚪🔄📦⚪]/g;
  const COOLDOWN_SECONDS = 14400;
  const MAIN = document.getElementById("main");
  const META = document.getElementById("meta");
  const WALLET_INPUT = document.getElementById("wallet");
  const WALLET_CLEAR = document.getElementById("wallet-clear");
  const MODAL = document.getElementById("modal");
  const MODAL_BACKDROP = document.getElementById("modal-backdrop");
  const MODAL_TITLE = document.getElementById("modal-title");
  const MODAL_LOG = document.getElementById("modal-log");
  const MODAL_META = document.getElementById("modal-meta");
  const MODAL_CLOSE = document.getElementById("modal-close");
  const MODAL_DIAGNOSTICS = document.getElementById("modal-diagnostics");
  const MODAL_DOWNLOAD = document.getElementById("modal-download");
  const MODAL_CLEAR = document.getElementById("modal-clear");
  const FOLLOW = document.getElementById("follow");

  let strategies = ["exit_pool", "v1", "aggressive"];
  let openConsoleId = null;
  let consoleTimer = null;
  const LOG_FOLLOW_THRESHOLD = 24;

  // Persistent per-bot messages that survive card re-renders (cleared after TTL).
  const _botMsg = new Map(); // id → { text, color, expires }
  function setBotMsg(id, text, color = "var(--good)", ttl = 20000) {
    _botMsg.set(String(id), { text, color, expires: Date.now() + ttl });
    _applyBotMsg(String(id));
  }
  function _applyBotMsg(id) {
    const m = _botMsg.get(id);
    if (!m) return;
    if (Date.now() > m.expires) { _botMsg.delete(id); return; }
    const el = document.getElementById("err-" + id);
    if (el) { el.style.color = m.color; el.textContent = m.text; }
  }
  function applyAllBotMsgs() {
    for (const id of [..._botMsg.keys()]) _applyBotMsg(id);
  }

  // --- Persistence ---
  const savedWallet = localStorage.getItem("lp.wallet") || "";
  WALLET_INPUT.value = savedWallet;

  // --- Helpers ---
  const esc = s => String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

  function lastEmoji(logTail) {
    if (!logTail || !logTail.length) return "⚪";
    for (let i = logTail.length - 1; i >= 0; i--) {
      const m = logTail[i].match(STATUS_EMOJI_RE);
      if (m && m.length) return m[0];
    }
    return "⚪";
  }

  function fmtAgo(secs) {
    if (secs == null || secs < 0) return "—";
    if (secs < 60) return Math.floor(secs) + "s ago";
    if (secs < 3600) return Math.floor(secs / 60) + "m ago";
    if (secs < 86400) return Math.floor(secs / 3600) + "h ago";
    return Math.floor(secs / 86400) + "d ago";
  }

  function fmtDur(secs) {
    if (secs == null || secs <= 0) return "ready";
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    return h > 0 ? h + "h " + m + "m" : m + "m";
  }

  function fmtUSD(n) {
    if (n == null || n === 0) return "—";
    return "$" + Math.round(n).toLocaleString();
  }

  function fmtMoney(n) {
    if (n == null) return "—";
    const sign = n > 0 ? "+" : "";
    return sign + "$" + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtPct(n) {
    if (n == null || !Number.isFinite(n)) return "—";
    const sign = n > 0 ? "+" : "";
    return sign + n.toFixed(2) + "%";
  }

  function fmtFee(fee) {
    if (fee == null) return "—";
    return (fee / 10000).toString() + "%";
  }

  function cooldownRemaining(lastActionTime) {
    if (!lastActionTime) return null;
    return COOLDOWN_SECONDS - ((Date.now() / 1000) - lastActionTime);
  }

  function fmtRam(kb) {
    if (!kb || kb <= 0) return "—";
    return (kb / 1024).toFixed(0) + " MB";
  }

  // RAM chart — preserveAspectRatio="none" fills 100% width; HTML <span>
  // labels are absolutely-positioned so they never stretch with the SVG.
  // SVG coordinate space: 1000×100 (shapes scale, labels don't).
  function ramChartSvg(history) {
    if (!history || history.length < 2) return "";
    const vals = history.map(h => h.kb);
    const TOTAL_KB = 512 * 1024, WARN_KB = 200 * 1024, CRIT_KB = 400 * 1024;
    const maxVal = Math.max(...vals);
    const W = 1000, H = 100, padT = 8, padB = 18, iH = H - padT - padB;

    const sy = v => padT + iH * (1 - v / TOTAL_KB);
    const sx = i => (i / Math.max(vals.length - 1, 1)) * W;

    const pts  = vals.map((v, i) => `${sx(i).toFixed(0)},${sy(v).toFixed(1)}`).join(" ");
    const area = `0,${(padT + iH).toFixed(1)} ${pts} ${W},${(padT + iH).toFixed(1)}`;

    const lc = maxVal > CRIT_KB ? "#f85149" : maxVal > WARN_KB ? "#f0883e" : "#3fb950";
    const fc = maxVal > CRIT_KB ? "rgba(248,81,73,.12)" : maxVal > WARN_KB ? "rgba(240,136,62,.12)" : "rgba(63,185,80,.12)";

    const refLines = [[TOTAL_KB,"var(--muted)",false],[CRIT_KB,"#f85149",true],[WARN_KB,"#f0883e",true],[0,"var(--muted)",false]]
      .map(([v,clr,dashed]) => {
        const y = sy(v).toFixed(1);
        const dash = dashed ? `stroke-dasharray="20 15"` : "";
        return `<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="${clr}" stroke-width="${dashed?2:1}" ${dash} opacity="${dashed?.5:.2}"/>`;
      }).join("");

    const maxIdx = vals.lastIndexOf(maxVal);
    const curX = sx(vals.length-1).toFixed(0), curY = sy(vals[vals.length-1]).toFixed(1);
    const mX = sx(maxIdx).toFixed(0), mY = sy(maxVal).toFixed(1);
    const mCircle = maxVal !== vals[vals.length-1]
      ? `<circle cx="${mX}" cy="${mY}" r="7" fill="${lc}" opacity=".85"/>` : "";

    // HTML labels — % coords so they align with the stretched SVG lines
    const pct = (v, off=9) => ((sy(v) + off) / H * 100).toFixed(1);
    const mXpct = (sx(maxIdx) / W * 100).toFixed(1);
    const mYpct = Math.max(1, sy(maxVal) / H * 100 - 13).toFixed(1);
    const mSide = Number(mXpct) > 60 ? `right:${(100-Number(mXpct)).toFixed(1)}%` : `left:${mXpct}%`;
    const mLbl  = maxVal !== vals[vals.length-1]
      ? `<span style="position:absolute;top:${mYpct}%;${mSide};font-size:9px;color:${lc};white-space:nowrap;line-height:1">▲${fmtRam(maxVal)}</span>` : "";
    const lsp = (v, off=9, clr="var(--muted)") =>
      `<span style="position:absolute;top:${pct(v,off)}%;left:3px;font-size:9px;color:${clr};opacity:.7;line-height:1">`;

    return `<div style="position:relative;width:100%;height:${H}px;margin:0.4rem 0 0">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;width:100%;height:100%">
        <rect width="${W}" height="${H}" fill="var(--bg)" rx="4"/>
        ${refLines}
        <polygon points="${area}" fill="${fc}"/>
        <polyline points="${pts}" fill="none" stroke="${lc}" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
        ${mCircle}<circle cx="${curX}" cy="${curY}" r="7" fill="${lc}"/>
      </svg>
      ${lsp(TOTAL_KB)}512M</span>
      ${lsp(CRIT_KB,9,"#f85149")}400M</span>
      ${lsp(WARN_KB,9,"#f0883e")}200M</span>
      ${lsp(0,-13)}0</span>
      ${mLbl}
    </div>`;
  }

  function isValidWallet(s) {
    return /^0x[0-9a-fA-F]{40}$/.test(s || "");
  }

  function isNearBottom(el, threshold = LOG_FOLLOW_THRESHOLD) {
    return (el.scrollHeight - el.clientHeight - el.scrollTop) <= threshold;
  }

  // --- API wrappers ---
  async function api(path, opts) {
    const r = await fetch(path, opts);
    const txt = await r.text();
    let data;
    try { data = JSON.parse(txt); } catch { data = { ok: false, error: "bad json", raw: txt }; }
    if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
    return data;
  }

  // --- Log rendering ---
  function renderLine(line) {
    const e = line.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    let cls = "log-line";
    if (/\[ERROR\]|ERROR|FATAL/.test(line)) cls += " log-error";
    else if (/\[WARN\]|WARN/.test(line)) cls += " log-warn";
    else if (/AUTO-EXEC|EJECUTANDO|rebalance|Rebalance|exit.*pool|EXIT|ENTER|upgrading to auto|SIGNAL|EXECUTING/.test(line)) cls += " log-action";
    else if (/unlocked|started|✓|green|Keystore/.test(line)) cls += " log-ok";
    return `<span class="${cls}">${e}</span>`;
  }

  // Returns true for routine "all ok" status lines with no changes/errors/actions.
  // Consecutive runs of these are collapsed in renderLog to reduce noise.
  function isRoutineOk(line) {
    if (/\[ERROR\]|ERROR|FATAL|\[WARN\]|WARN/.test(line)) return false;
    if (/AUTO-EXEC|EJECUTANDO|rebalance|Rebalance|exit.*pool|EXIT|ENTER|SIGNAL|EXECUTING|unlocked|started|Keystore|strategy|Strategy|Auto-disc|Position updated|Wallet now|resyncing/.test(line)) return false;
    return /[🟢🟡]/.test(line);
  }

  function renderLog(lines) {
    if (!lines || !lines.length) return "";
    const out = [];
    let i = 0;
    while (i < lines.length) {
      if (!isRoutineOk(lines[i])) {
        out.push(renderLine(lines[i]));
        i++;
      } else {
        // Scan the full consecutive run
        const start = i;
        while (i < lines.length && isRoutineOk(lines[i])) i++;
        const count = i - start;
        if (count <= 2) {
          for (let j = start; j < start + count; j++) out.push(renderLine(lines[j]));
        } else {
          out.push(renderLine(lines[start]));
          out.push(`<span class="log-line" style="color:var(--muted);font-style:italic;opacity:.6">  ···  ${count - 2} líneas iguales ···</span>`);
          out.push(renderLine(lines[i - 1]));
        }
      }
    }
    return out.join("\n");
  }

  function positionValueUsd(liquidity, tickLo, tickHi, priceUsdcPerEth) {
    const liq = Number(liquidity || 0);
    const lo = Number(tickLo);
    const hi = Number(tickHi);
    const price = Number(priceUsdcPerEth || 0);
    if (!(liq > 0) || !Number.isFinite(lo) || !Number.isFinite(hi) || !(price > 0)) return null;
    const tickLower = Math.min(lo, hi);
    const tickUpper = Math.max(lo, hi);
    const raw = price / 1e12;
    const sqrtP = Math.sqrt(raw);
    const sqrtA = Math.pow(1.0001, tickLower / 2);
    const sqrtB = Math.pow(1.0001, tickUpper / 2);
    let amount0 = 0;
    let amount1 = 0;
    if (sqrtP <= sqrtA) {
      amount0 = liq * (sqrtB - sqrtA) / (sqrtA * sqrtB);
    } else if (sqrtP >= sqrtB) {
      amount1 = liq * (sqrtB - sqrtA);
    } else {
      amount0 = liq * (sqrtB - sqrtP) / (sqrtP * sqrtB);
      amount1 = liq * (sqrtP - sqrtA);
    }
    const weth = amount0 / 1e18;
    const usdc = amount1 / 1e6;
    return weth * price + usdc;
  }

  function calcPerformance(payload, pos) {
    const perf = payload.performance || {};
    const pnlUsd = Number(perf.pnl_usd ?? 0);
    const trackedDays = Number(perf.tracked_days ?? 0);
    const st = payload.state || {};
    const lastPrice = st.price_history && st.price_history.length
      ? st.price_history[st.price_history.length - 1].p
      : null;
    const capitalUsd = pos
      ? positionValueUsd(pos.liquidity, pos.tick_lower, pos.tick_upper, lastPrice)
      : null;
    const gainPct = capitalUsd > 0 ? (pnlUsd / capitalUsd) * 100 : null;
    const aprPct = gainPct != null && trackedDays > 0 ? gainPct * (365 / trackedDays) : null;
    return { pnlUsd, trackedDays, capitalUsd, gainPct, aprPct };
  }

  // --- Renderers ---
  function runningCard(id, payload, pos = null) {
    const st = payload.state || {};
    const strategyName = payload.strategy_name || "exit_pool";
    const lastPrice = st.price_history && st.price_history.length
      ? st.price_history[st.price_history.length - 1].p
      : null;
    const perf = calcPerformance(payload, pos);
    const strategyPerf = payload.strategy_performance || [];
    const logAge = payload.log_last_modified
      ? (Date.now() / 1000) - payload.log_last_modified
      : null;
    // Use last_cycle_at from state if available (more precise than log mtime)
    const cycleAge = st.last_cycle_at
      ? (Date.now() / 1000) - st.last_cycle_at
      : logAge;
    const poolText = st.pool_active === false
      ? "📦 closed (" + (st.hold_asset || "?") + ")"

    const miniLines = (payload.log_tail || []).slice(-4);

      : "";
    const stratOpts = strategies.map(s =>
      `<option value="${s}"${s === strategyName ? " selected" : ""}>${s}</option>`
    ).join("");
    const ramKb = st.ram_rss_kb || 0;
    const ramHist = st.ram_history || [];
    const ramMax = ramHist.length ? Math.max(...ramHist.map(h => h.kb)) : ramKb;
    const ramMin = ramHist.length ? Math.min(...ramHist.map(h => h.kb)) : ramKb;
    const ramLineColor = ramMax > 400*1024 ? "var(--bad)" : ramMax > 200*1024 ? "var(--warn)" : "var(--good)";
    const ramSummary = ramKb
      ? `<div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--muted);margin-bottom:0.1rem">
           <span>RAM · <span style="color:${ramLineColor};font-weight:600">${fmtRam(ramKb)}</span> actual · pico <span style="color:${ramLineColor}">${fmtRam(ramMax)}</span> · mín ${fmtRam(ramMin)}</span>
           <span style="opacity:.6">${ramHist.length} ciclos · 512 MB total</span>
         </div>`
      : "";
    const ageLabel = cycleAge != null ? fmtAgo(cycleAge) : "—";
    const statusTag = payload.stale
      ? `<span class="tag stale">stale · ${ageLabel}</span>`
      : `<span class="tag live">${ageLabel}</span>`;
    const cfg = payload.bot_config || {};
    const targetUsd = typeof cfg.target_usd === "number" && cfg.target_usd > 0 ? cfg.target_usd : null;
    const capitalLabel = targetUsd ? `<span style="color:var(--accent)">$${Math.round(targetUsd).toLocaleString()}</span>` : `<span style="color:var(--muted)">all available</span>`;
    const deployPending = cfg.request_recapitalize === true;
    return `
      <div class="hdr">
        <span>
          <span class="emoji">${lastEmoji(payload.log_tail)}</span>
          <span class="pid">#${id}</span>
          ${statusTag}
          ${hasError ? '<span class="tag stale">error</span>' : ''}
          ${deployPending ? '<span class="tag" style="border-color:var(--accent);color:var(--accent)">⏳ deploy pending</span>' : ''}
        </span>
        <span class="tag">auto-execute</span>
      </div>
      <dl>
        <dt>ETH</dt><dd>${fmtUSD(lastPrice)}</dd>
        <dt>Range</dt><dd>${fmtUSD(st.range_lo)} – ${fmtUSD(st.range_hi)}</dd>
        <dt>Capital pool</dt><dd>${capitalLabel} <button class="ghost" data-action="deploy-capital" data-id="${id}" style="font-size:0.72rem;padding:0.15rem 0.45rem;margin-left:0.3rem" title="Rebalancear ahora con todo el capital disponible (ignora cooldown)">deploy</button></dd>
        <dt>Cooldown</dt><dd>${fmtDur(cooldownRemaining(st.last_action_time))}</dd>
        <dt>Pool</dt><dd>${esc(poolText)}</dd>
        <dt>Strategy</dt><dd>${esc(strategyName)}</dd>
        <dt>PnL</dt><dd>${fmtMoney(perf.pnlUsd)}</dd>
        <dt>Gain</dt><dd>${fmtPct(perf.gainPct)}</dd>
        <dt>APR now</dt><dd>${fmtPct(perf.aprPct)}</dd>
        <dt>Actions today</dt><dd>${st.actions_today || 0} / 3</dd>
        ${(ramKb || ramHist.length >= 2) ? `<div style="grid-column:1/-1;padding-top:0.4rem">${ramSummary}${ramChartSvg(ramHist)}</div>` : ''}
      </dl>
      <pre class="mini-log">${renderLog(miniLines)}</pre>
      <div class="actions">
        <select data-strategy="${id}">${stratOpts}</select>
        <button class="ghost" data-action="set-strategy" data-id="${id}">apply strategy</button>
        <button class="ghost" data-action="set-capital" data-id="${id}" title="Capital máximo a depositar en la pool">capital</button>
        <button data-action="console" data-id="${id}">full log</button>
        ${ackButton}
        <button class="danger" data-action="stop" data-id="${id}">stop</button>
      </div>
      <div class="perf-note">Track: ${perf.trackedDays > 0 ? perf.trackedDays.toFixed(1) + " d" : "—"} · fees ${fmtMoney(payload.performance ? payload.performance.fees_usd : null)} · IL ${fmtMoney(payload.performance ? -Math.abs(payload.performance.il_usd || 0) : null)}</div>
      ${strategyPerf.length ? `
      <table class="perf-table">
        <thead>
          <tr>
            <th>Strategy</th>
            <th>APR TWR</th>
            <th>TWR</th>
            <th>PnL</th>
            <th>Days</th>
            <th>Flows</th>
          </tr>
        </thead>
        <tbody>
          ${strategyPerf.slice(0, 4).map(row => `
            <tr>
              <td class="${row.is_current ? "current" : ""}">${esc(row.strategy)}${row.is_current ? " *" : ""}</td>
              <td>${fmtPct(row.apr_pct)}</td>
              <td>${fmtPct(row.twr_pct)}</td>
              <td>${fmtMoney(row.pnl_usd)}</td>
              <td>${Number(row.tracked_days || 0).toFixed(1)} d</td>
              <td>${row.cash_flow_count ?? 0}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>` : ""}
      <div class="err" id="err-${id}"></div>
    `;
  }

  function positionCard(pos, running) {
    if (running) return null; // prefer runningCard when the bot is up
    const strategyName = pos.strategy_name || "exit_pool";
    const stratOpts = strategies.map(s =>
      `<option value="${s}"${s === strategyName ? " selected" : ""}>${s}</option>`
    ).join("");
    const liqBadge = pos.has_liquidity
      ? '<span class="tag live">has liquidity</span>'
      : '<span class="tag idle">empty</span>';
    return `
      <div class="hdr">
        <span>
          <span class="emoji">💤</span>
          <span class="pid">#${pos.id}</span>
          ${liqBadge}
        </span>
        <span class="tag">${fmtFee(pos.fee)}</span>
      </div>
      <dl>
        <dt>Range</dt><dd>${fmtUSD(pos.lo)} – ${fmtUSD(pos.hi)}</dd>
        <dt>Pair</dt><dd>WETH / USDC</dd>
      </dl>
      <div class="actions">
        <select data-strategy="${pos.id}">${stratOpts}</select>
        <button class="primary" data-action="start" data-id="${pos.id}">start as bot</button>
      </div>
      <div class="err" id="err-${pos.id}"></div>
    `;
  }

  function upsertCard(id, inner) {
    let card = document.getElementById("card-" + id);
    if (!card) {
      card = document.createElement("div");
      card.className = "card";
      card.id = "card-" + id;
    }
    card.innerHTML = inner;
    return card;
  }

  async function refreshHealth() {
    try {
      const h = await api("/api/health");
      if (h.strategies && h.strategies.length) strategies = h.strategies;
      META.textContent = `${h.hostname} · ${h.bots_count} bot${h.bots_count === 1 ? "" : "s"} · up ${fmtDur(h.uptime_seconds)}${h.auth_enabled ? " · auth on" : " · auth off"}`;
    } catch {
      META.textContent = "disconnected";
    }
  }

  async function refreshAll() {
    let bots = [];
    try { bots = await api("/api/bots"); } catch { /* leave empty */ }
    const botsSet = new Set(bots);

    const wallet = (WALLET_INPUT.value || "").trim();
    let positions = [];
    let walletValid = isValidWallet(wallet);
    let walletError = null;
    if (walletValid) {
      try {
        const r = await api("/api/positions?wallet=" + encodeURIComponent(wallet));
        positions = r.positions || [];
      } catch (e) {
        walletError = e.message || String(e);
        console.error("positions", e);
      }
    }

    const posIds = new Set(positions.map(p => p.id));
    const orphanBots = bots.filter(b => !posIds.has(b)); // running but not in wallet

    // If there's literally nothing to show, render the empty state.
    if (!bots.length && !walletValid) {
      MAIN.innerHTML = `
        <div class="empty">
          <p>No bots running, and no wallet address entered.</p>
          <p>Paste a wallet address above and I'll list your WETH/USDC positions on Base.</p>
        </div>`;
      return;
    }
    if (!bots.length && walletValid && !positions.length) {
      if (walletError) {
        MAIN.innerHTML = `
          <div class="empty">
            <p style="color: var(--bad);">Failed to load positions: ${esc(walletError)}</p>
            <p style="font-size:0.8rem;color:var(--muted);">Base's public RPC is rate-limited. If this persists across retries, try again in a minute.</p>
          </div>`;
      } else {
        MAIN.innerHTML = `
          <div class="empty">
            <p>No WETH/USDC positions found for that wallet on Base.</p>
            <p style="font-family: 'SF Mono', monospace; font-size: 0.8rem;">${esc(wallet)}</p>
          </div>`;
      }
      return;
    }

    // Build layout: positions section (if any) + orphan bots section (if any).
    if (!MAIN.querySelector("#wallet-summary") || !MAIN.querySelector("#positions-section") || !MAIN.querySelector("#bots-section")) {
      MAIN.innerHTML = `
        <div id="wallet-summary" style="display:none"></div>
        <div id="positions-section" style="display:none">
          <div class="section-label">Your positions</div>
          <div class="grid" id="positions-grid"></div>
          <details class="empty-box" id="empty-details" style="display:none">
            <summary id="empty-summary"></summary>
            <div class="grid" id="empty-grid" style="margin-top:0.8rem"></div>
          </details>
        </div>
        <div id="bots-section" style="display:none;margin-top:2rem">
          <div class="section-label">Running bots</div>
          <div class="grid" id="bots-grid"></div>
        </div>`;
    }

    const posSection = MAIN.querySelector("#positions-section");
    const walletSummary = MAIN.querySelector("#wallet-summary");
    const botsSection = MAIN.querySelector("#bots-section");
    const posGrid = MAIN.querySelector("#positions-grid");
    const emptyDetails = MAIN.querySelector("#empty-details");
    const emptySummary = MAIN.querySelector("#empty-summary");
    const emptyGrid = MAIN.querySelector("#empty-grid");
    const botsGrid = MAIN.querySelector("#bots-grid");

    // --- Positions section: split into active (has liquidity OR running) vs empty ---
    if (positions.length) {
      posSection.style.display = "";
      const payloadById = new Map();

      const active = positions.filter(p => p.has_liquidity || botsSet.has(p.id));
      const empty = positions.filter(p => !p.has_liquidity && !botsSet.has(p.id));

      async function renderTo(list, grid) {
        const known = new Set();
        for (const p of list) {
          known.add(p.id);
          let inner;
          if (botsSet.has(p.id)) {
            try {
              const payload = await api("/api/state/" + encodeURIComponent(p.id));
              payloadById.set(p.id, payload);
              inner = runningCard(p.id, payload, p);
            } catch {
              inner = runningCard(p.id, { position_id: p.id, state: null, log_tail: [], stale: true });
            }
          } else {
            inner = positionCard(p, false);
          }
          const card = upsertCard(p.id, inner);
          if (!card.parentNode || card.parentNode !== grid) grid.appendChild(card);
        }
        [...grid.children].forEach(c => {
          if (!known.has(c.id.replace("card-", ""))) c.remove();
        });
      }

      await renderTo(active, posGrid);
      await renderTo(empty, emptyGrid);

      const summaryStats = active.reduce((acc, p) => {
        if (!botsSet.has(p.id)) return acc;
        const payload = payloadById.get(p.id);
        if (!payload) return acc;
        const perf = calcPerformance(payload, p);
        if (!(perf.capitalUsd > 0)) return acc;
        acc.bots += 1;
        acc.capitalUsd += perf.capitalUsd;
        acc.pnlUsd += perf.pnlUsd;
        return acc;
      }, { bots: 0, capitalUsd: 0, pnlUsd: 0 });

      if (summaryStats.bots > 0 && summaryStats.capitalUsd > 0) {
        summaryStats.gainPct = (summaryStats.pnlUsd / summaryStats.capitalUsd) * 100;
        const daysWeighted = active.reduce((acc, p) => {
          if (!botsSet.has(p.id)) return acc;
          const payload = payloadById.get(p.id);
          if (!payload) return acc;
          const perf = calcPerformance(payload, p);
          if (!(perf.capitalUsd > 0) || !(perf.trackedDays > 0)) return acc;
          acc.weightedDays += perf.trackedDays * perf.capitalUsd;
          acc.capitalUsd += perf.capitalUsd;
          return acc;
        }, { weightedDays: 0, capitalUsd: 0 });
        const trackedDays = daysWeighted.capitalUsd > 0
          ? daysWeighted.weightedDays / daysWeighted.capitalUsd
          : 0;
        summaryStats.aprPct = trackedDays > 0
          ? summaryStats.gainPct * (365 / trackedDays)
          : null;
        const botStrategyTables = [];
        for (const p of active) {
          if (!botsSet.has(p.id)) continue;
          const payload = payloadById.get(p.id);
          if (!payload || !(payload.strategy_performance || []).length) continue;
          botStrategyTables.push(renderStrategyPerfTable(payload.strategy_performance, `TWR real por estrategia · bot #${p.id}`));
        }

        walletSummary.innerHTML = renderWalletSummary(summaryStats) + botStrategyTables.join("");
        walletSummary.style.display = "";
      } else {
        walletSummary.style.display = "none";
        walletSummary.innerHTML = "";
      }

      if (empty.length) {
        emptyDetails.style.display = "";
        emptySummary.textContent = `${empty.length} empty position${empty.length === 1 ? "" : "s"} (no liquidity)`;
      } else {
        emptyDetails.style.display = "none";
      }
    } else {
      walletSummary.style.display = "none";
      walletSummary.innerHTML = "";
      posSection.style.display = "none";
      posGrid.innerHTML = "";
      emptyGrid.innerHTML = "";
      emptyDetails.style.display = "none";
    }

    // --- Orphan bots section (running but not in this wallet) ---
    if (orphanBots.length) {
      botsSection.style.display = "";
      const keep = new Set(orphanBots);
      for (const id of orphanBots) {
        try {
          const payload = await api("/api/state/" + encodeURIComponent(id));
          const card = upsertCard(id, runningCard(id, payload));
          if (!card.parentNode || card.parentNode !== botsGrid) botsGrid.appendChild(card);
        } catch { /* ignore individual failure */ }
      }
      [...botsGrid.children].forEach(c => {
        if (!keep.has(c.id.replace("card-", ""))) c.remove();
      });
    } else {
      botsSection.style.display = "none";
      botsGrid.innerHTML = "";
    }

    applyAllBotMsgs();
  }

  // --- Console modal ---
  function openConsole(id) {
    openConsoleId = id;
    MODAL_TITLE.textContent = "console · bot #" + id;
    MODAL_LOG.textContent = "loading…";
    MODAL.classList.add("open");
    MODAL_BACKDROP.classList.add("open");
    pollConsole();
    if (consoleTimer) clearInterval(consoleTimer);
    consoleTimer = setInterval(pollConsole, 2000);
  }

  function closeConsole() {
    openConsoleId = null;
    MODAL.classList.remove("open");
    MODAL_BACKDROP.classList.remove("open");
    if (consoleTimer) { clearInterval(consoleTimer); consoleTimer = null; }
  }

  async function pollConsole() {
    if (!openConsoleId) return;
    try {
      const shouldFollow = FOLLOW.checked;
      const wasNearBottom = isNearBottom(MODAL_LOG);
      const previousScrollTop = MODAL_LOG.scrollTop;
      const payload = await api("/api/state/" + encodeURIComponent(openConsoleId));
      MODAL_LOG.innerHTML = renderLog(payload.log_tail);
      if (shouldFollow && wasNearBottom) {
        MODAL_LOG.scrollTop = MODAL_LOG.scrollHeight;
      } else {
        MODAL_LOG.scrollTop = previousScrollTop;
      }
      const logAge = payload.log_last_modified
        ? (Date.now() / 1000) - payload.log_last_modified
        : null;
      const errors = (payload.log_tail || []).filter(l => /\[ERROR\]|FATAL/.test(l)).length;
      MODAL_META.textContent = `${(payload.log_tail || []).length} lines · last write ${fmtAgo(logAge)}${payload.stale ? " · STALE" : ""}${errors ? ` · ${errors} error(s)` : ""}`;
    } catch (e) {
      MODAL_META.textContent = "fetch failed: " + e.message;
    }

  // Beautifier: walks the object, renders leaves with their dotted path's doc
  // text if we have one. Nested objects become sub-sections.
  function beautify(obj, prefix) {
    const root = document.createElement("div");
    root.className = "beautify";
    for (const [k, v] of Object.entries(obj)) {
      const fullKey = prefix ? `${prefix}.${k}` : k;
      if (v && typeof v === "object" && !Array.isArray(v)) {
        const group = document.createElement("div");
        group.className = "group";
        const title = document.createElement("div");
        title.className = "group-title";
        title.textContent = k;
        group.appendChild(title);
        group.appendChild(beautify(v, fullKey));
        root.appendChild(group);
      } else {
        const row = document.createElement("div");
        row.className = "row";
        const keyEl = document.createElement("div");
        keyEl.className = "key";
        keyEl.textContent = k;
        const doc = FIELD_DOCS[fullKey];
        if (doc) {
          const docEl = document.createElement("div");
          docEl.className = "doc";
          docEl.textContent = doc;
          keyEl.appendChild(docEl);
        }
        const valEl = document.createElement("div");
        valEl.className = "val " + (typeof v);
        if (typeof v === "string") valEl.textContent = `"${v}"`;
        else if (Array.isArray(v)) valEl.textContent = JSON.stringify(v);
        else valEl.textContent = String(v);
        row.appendChild(keyEl);
        row.appendChild(valEl);
        root.appendChild(row);
      }
    }
    return root;
  }

      currentStrategy.content = parsed;
      renderStrategyBody();
      refreshHealth(); // refresh the in-app strategy list cache

  }

  function renderCurrent(s, extra = "") {

      : "";
    return `

  async function doCheck() {

    btn.disabled = true; btn.textContent = "fetching…"; if (meta) meta.textContent = "";

        const rows = r.commits.map(c => `

  async function doInstall() {

      UPDATES_BODY.innerHTML = renderCurrent(s) + `
        <div class="card" style="margin:0 0 1rem 0">
          <div class="hdr"><span><span class="emoji">✅</span><span class="pid">installed successfully</span></span></div>
          <p style="color:var(--good);font-size:0.9rem;margin:0.3rem 0 0 0">
            Now on <span style="font-family:monospace">${esc(s.short)}</span>. ${s.last_commit ? "Latest: " + esc(s.last_commit.message) : ""}
          </p>
        </div>
      ` + restartBlock;
      // Wire restart buttons
      UPDATES_BODY.querySelectorAll("button[data-restart]").forEach(b => {
        b.addEventListener("click", () => doRestart(b.dataset.restart));
      });
      // Also refresh the dashboard so running bots pick up the new SHA in meta.
      refreshAll();
    } catch (e) {
      btn.disabled = false;
      btn.textContent = "install update";
      const result = document.getElementById("upd-install-result");
      if (result) result.innerHTML = `<div class="card" style="margin:0.8rem 0 0 0;border-color:var(--bad)"><p style="color:var(--bad);margin:0">Install failed: ${esc(e.message)}</p></div>`;
    }
  }

  async function doRestart(id) {
    const btn = document.querySelector(`button[data-restart="${CSS.escape(id)}"]`);
    const msg = document.getElementById("restart-msg-" + id);
    if (btn) { btn.disabled = true; btn.textContent = "restarting…"; }
    if (msg) msg.textContent = "";
    try {
      await api("/api/bots/" + encodeURIComponent(id) + "/restart", { method: "POST" });
      if (btn) { btn.textContent = "restarted"; btn.style.color = "var(--good)"; btn.style.borderColor = "var(--good)"; }
      if (msg) msg.textContent = "ok";
    } catch (e) {
      if (btn) { btn.disabled = false; btn.textContent = "restart"; }
      if (msg) { msg.textContent = "failed: " + e.message; msg.style.color = "var(--bad)"; }
    }
  }

  OPEN_UPDATES.addEventListener("click", openUpdates);
  UPDATES_CLOSE.addEventListener("click", closeUpdates);

  // Single backdrop/Escape handler that dispatches to whichever modal is open.
  MODAL_BACKDROP.addEventListener("click", () => {
    if (STRATEGIES_MODAL.classList.contains("open")) closeStrategies();
    if (UPDATES_MODAL.classList.contains("open")) closeUpdates();
    if (MODAL.classList.contains("open")) closeConsole();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if (STRATEGIES_MODAL.classList.contains("open")) closeStrategies();
    if (UPDATES_MODAL.classList.contains("open")) closeUpdates();
    if (MODAL.classList.contains("open")) closeConsole();
  });

  // --- Kickoff ---
  refreshHealth();
  refreshAll();
  setInterval(refreshHealth, 10000);
  setInterval(refreshAll, 5000);
})();
</script>
</body>
</html>
